<script type="text/javascript" src="src/draw_commands.js"></script>
<script>
    var Canvas = document.getElementById("Hydrogen");
    var ctx = Canvas.getContext('2d');

    var WIDTH = Canvas.width;
    var HEIGHT = Canvas.height;

    var elec_Theta = 0;
    var orbital_Radius = 100;

    function draw_ring_of_field(){
        for (i = 0; i< 2*Math.PI; i+= Math.PI/10) {
            draw_Arrow_STD(WIDTH/2 + orbital_Radius*Math.cos(i), HEIGHT/2 + orbital_Radius*Math.sin(i), 50*Math.cos(i), 50*Math.sin(i), ctx, color='#DD4444');
        }

        ctx.font = "20px Times";
        ctx.fillStyle='#DD4444';
        ctx.textBaseline='middle';
        ctx.textAlign='left';
        ctx.fillText("E", WIDTH/2 + 155, HEIGHT/2);

    }

    function draw_Electron_Force(theta) {
        let x = orbital_Radius*Math.cos(theta);
        let y = orbital_Radius*Math.sin(theta);
        let dx = -50*Math.cos(theta);
        let dy = -50*Math.sin(theta);

        draw_Arrow_STD(WIDTH/2 + x, HEIGHT/2 - y, dx, -dy, ctx, color='#444444');

        

        ctx.font = "20px Times";
        ctx.fillStyle='#444444';
        ctx.textBaseline='middle';
        ctx.textAlign='center';
        ctx.fillText("F", WIDTH/2 + x + 1.3*dx , HEIGHT/2 - y - 1.3*dy);

    }

    function draw_Electron_Velocity(theta) {
        let x = orbital_Radius*Math.cos(theta);
        let y = orbital_Radius*Math.sin(theta);
        let dx = -50*Math.sin(theta);
        let dy = 50*Math.cos(theta);

        draw_Arrow_STD(WIDTH/2 + x, HEIGHT/2 - y, dx, -dy, ctx, color='#444444');

        

        ctx.font = "20px Times";
        ctx.fillStyle='#444444';
        ctx.textBaseline='middle';
        ctx.textAlign='center';
        ctx.fillText("v", WIDTH/2 + 0.9*x + 1.3*dx , HEIGHT/2 - 0.9*y - 1.3*dy);

    }

    function init() {
        draw_POS_CHG(WIDTH/2, HEIGHT/2, ctx);
    }
    init();






    let lastTime = null;
    function frame(time) {
        if (lastTime != null) {
            updateAnimation(Math.min(100, time - lastTime) / 1000);

            elec_Theta += 0.01;
        }
        lastTime = time;
        requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);


    function updateAnimation(step) {
        ctx.clearRect(0,0,WIDTH,HEIGHT);
        draw_POS_CHG(WIDTH/2, HEIGHT/2, ctx);
        draw_ring_of_field();
        draw_Electron_Force(elec_Theta);
        draw_Electron_Velocity(elec_Theta);
        draw_NEG_CHG(WIDTH/2 + orbital_Radius*Math.cos(elec_Theta), HEIGHT/2 - orbital_Radius*Math.sin(elec_Theta), ctx);
    }

</script>
